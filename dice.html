<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LiquidCasino — Dice</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root{--neon-cyan:#00f5ff;--neon-purple:#bf00ff;--neon-pink:#ff0080;--neon-green:#00ff99;--neon-red:#ff2040;--neon-gold:#ffd700;--bg-deep:#020408;--bg-card:rgba(255,255,255,0.03);--text-dim:rgba(255,255,255,0.5);}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Rajdhani',sans-serif;background:var(--bg-deep);color:#fff;min-height:100vh;overflow-x:hidden;cursor:none;}
  #cursor{position:fixed;pointer-events:none;z-index:99999;width:10px;height:10px;border-radius:50%;background:var(--neon-cyan);box-shadow:0 0 10px var(--neon-cyan);transform:translate(-50%,-50%);}
  .trail{position:fixed;pointer-events:none;z-index:99998;border-radius:50%;transform:translate(-50%,-50%);}
  #bgCanvas{position:fixed;inset:0;z-index:0;pointer-events:none;}
  body::before{content:'';position:fixed;inset:0;z-index:1;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;opacity:0.4;}
  #main{position:relative;z-index:2;max-width:560px;margin:0 auto;padding:0 20px 80px;}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:20px 0;gap:12px;flex-wrap:wrap;}
  .back-btn{font-family:'Orbitron',monospace;font-size:0.65rem;letter-spacing:0.2em;color:var(--text-dim);border:1px solid rgba(255,255,255,0.1);background:transparent;padding:8px 18px;border-radius:100px;cursor:none;text-decoration:none;transition:all 0.3s;}
  .back-btn:hover{color:var(--neon-cyan);border-color:rgba(0,245,255,0.4);}
  .balance-pill{font-family:'Orbitron',monospace;font-size:0.75rem;letter-spacing:0.15em;color:var(--neon-gold);border:1px solid rgba(255,215,0,0.3);background:rgba(255,215,0,0.06);padding:8px 20px;border-radius:100px;}
  .page-title{font-family:'Orbitron',monospace;font-weight:900;font-size:clamp(1.8rem,8vw,3rem);background:linear-gradient(135deg,var(--neon-purple),var(--neon-cyan));background-size:200% 200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:gradShift 3s ease infinite;text-align:center;margin:10px 0 6px;}
  @keyframes gradShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
  .page-sub{text-align:center;font-size:0.75rem;letter-spacing:0.3em;color:var(--text-dim);margin-bottom:28px;}

  /* DICE DISPLAY */
  .dice-wrap{display:flex;justify-content:center;gap:20px;margin-bottom:24px;}
  .die{width:90px;height:90px;background:rgba(255,255,255,0.04);border:2px solid rgba(0,245,255,0.3);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:2.8rem;transition:all 0.3s;box-shadow:0 0 20px rgba(0,245,255,0.1);}
  .die.rolling{animation:dieRoll 0.1s linear infinite;}
  @keyframes dieRoll{0%{transform:rotate(-5deg)}50%{transform:rotate(5deg)}100%{transform:rotate(-5deg)}}
  .die.win{border-color:var(--neon-green);box-shadow:0 0 24px rgba(0,255,153,0.3);}
  .die.lose{border-color:var(--neon-red);box-shadow:0 0 24px rgba(255,32,64,0.25);}

  /* RESULT */
  #resultBox{text-align:center;min-height:50px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;margin-bottom:20px;}
  #resultText{font-family:'Orbitron',monospace;font-size:1.2rem;font-weight:900;opacity:0;transform:scale(0.7);transition:all 0.5s cubic-bezier(.17,.67,.3,1.4);}
  #resultText.show{opacity:1;transform:scale(1);}
  #resultCoins{font-family:'Orbitron',monospace;font-size:0.85rem;letter-spacing:0.15em;opacity:0;transition:opacity 0.4s 0.2s;}
  #resultCoins.show{opacity:1;}

  /* BET TYPE */
  .bet-box{background:var(--bg-card);border:1px solid rgba(191,0,255,0.15);border-radius:16px;padding:20px;margin-bottom:16px;}
  .bet-title{font-family:'Orbitron',monospace;font-size:0.6rem;letter-spacing:0.4em;color:var(--text-dim);margin-bottom:14px;}

  .bet-types{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;}
  .bet-type-btn{font-family:'Orbitron',monospace;font-size:0.6rem;letter-spacing:0.1em;padding:10px 6px;border-radius:10px;border:1px solid rgba(255,255,255,0.1);background:transparent;color:var(--text-dim);cursor:none;transition:all 0.25s;text-align:center;}
  .bet-type-btn.active{border-color:var(--neon-purple);color:var(--neon-purple);background:rgba(191,0,255,0.1);box-shadow:0 0 12px rgba(191,0,255,0.2);}
  .bet-type-btn:hover{border-color:rgba(191,0,255,0.4);color:var(--neon-purple);}
  .bet-mult-label{font-size:0.55rem;opacity:0.6;margin-top:2px;}

  /* NUMBER SELECT */
  .num-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:16px;}
  .num-btn{aspect-ratio:1;border-radius:10px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.03);color:var(--text-dim);font-family:'Orbitron',monospace;font-size:0.8rem;font-weight:700;cursor:none;transition:all 0.2s;display:flex;align-items:center;justify-content:center;}
  .num-btn.active{border-color:var(--neon-cyan);color:var(--neon-cyan);background:rgba(0,245,255,0.1);box-shadow:0 0 10px rgba(0,245,255,0.2);}
  .num-btn:hover{border-color:rgba(0,245,255,0.4);}
  #numSelect{display:none;}

  .bet-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .bet-label{font-family:'Orbitron',monospace;font-size:0.6rem;letter-spacing:0.25em;color:var(--text-dim);}
  .preset-btn{font-family:'Orbitron',monospace;font-size:0.6rem;letter-spacing:0.1em;padding:6px 12px;border-radius:100px;border:1px solid rgba(255,255,255,0.12);background:transparent;color:var(--text-dim);cursor:none;transition:all 0.2s;}
  .preset-btn:hover{border-color:rgba(191,0,255,0.4);color:var(--neon-purple);}
  #betInput{font-family:'Orbitron',monospace;font-size:0.85rem;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);color:#fff;padding:8px 14px;border-radius:10px;outline:none;width:100px;text-align:center;}

  .roll-btn{display:block;width:100%;font-family:'Orbitron',monospace;font-size:0.85rem;letter-spacing:0.3em;font-weight:700;color:#fff;background:linear-gradient(135deg,var(--neon-purple),var(--neon-pink));border:none;padding:16px;border-radius:100px;cursor:none;transition:all 0.3s;box-shadow:0 0 24px rgba(191,0,255,0.35);margin-top:16px;}
  .roll-btn:hover{box-shadow:0 0 40px rgba(191,0,255,0.6);transform:scale(1.02);}
  .roll-btn:disabled{opacity:0.4;transform:none;}

  .hist-title{font-family:'Orbitron',monospace;font-size:0.65rem;letter-spacing:0.4em;color:var(--text-dim);margin-bottom:12px;margin-top:24px;}
  .hist-list{display:flex;flex-direction:column;gap:6px;}
  .hist-row{display:flex;align-items:center;justify-content:space-between;background:var(--bg-card);border-radius:8px;padding:8px 14px;border:1px solid rgba(255,255,255,0.04);}
  .hist-info{font-size:0.8rem;color:var(--text-dim);}
  .hist-profit{font-family:'Orbitron',monospace;font-size:0.75rem;}
  .hist-profit.win{color:var(--neon-green);}
  .hist-profit.loss{color:var(--neon-red);}

  #toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(100px);z-index:9999;font-family:'Orbitron',monospace;font-size:0.7rem;letter-spacing:0.2em;padding:12px 28px;border-radius:100px;transition:transform 0.4s cubic-bezier(.17,.67,.3,1.4),opacity 0.4s;opacity:0;pointer-events:none;white-space:nowrap;}
  #toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
  #toast.ok{background:rgba(0,255,153,0.12);border:1px solid rgba(0,255,153,0.4);color:var(--neon-green);}
  #toast.err{background:rgba(255,32,64,0.12);border:1px solid rgba(255,32,64,0.4);color:var(--neon-red);}
  footer{text-align:center;font-size:0.65rem;letter-spacing:0.2em;color:rgba(255,255,255,0.12);border-top:1px solid rgba(255,255,255,0.04);padding:20px;position:relative;z-index:2;}
  ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--neon-purple);border-radius:2px}
</style>
</head>
<body>
<div id="cursor"></div>
<canvas id="bgCanvas"></canvas>
<div id="toast"></div>
<div id="main">
  <div class="topbar">
    <a href="casino.html" class="back-btn">← ATGAL</a>
    <div class="balance-pill" id="balPill">⬡ 0 JEVREJŲ</div>
  </div>
  <div class="page-title">DICE</div>
  <div class="page-sub">◈ MESK KAULIUKĄ ◈</div>

  <div class="dice-wrap">
    <div class="die" id="die1">⚀</div>
    <div class="die" id="die2">⚀</div>
  </div>

  <div id="resultBox">
    <div id="resultText"></div>
    <div id="resultCoins"></div>
  </div>

  <div class="bet-box">
    <div class="bet-title">◈ STATYMŲ TIPAS ◈</div>
    <div class="bet-types">
      <div class="bet-type-btn active" onclick="setBetType('high')">AUKŠTAS<br><span class="bet-mult-label">4–6 · 1.9x</span></div>
      <div class="bet-type-btn" onclick="setBetType('low')">ŽEMAS<br><span class="bet-mult-label">1–3 · 1.9x</span></div>
      <div class="bet-type-btn" onclick="setBetType('even')">LYGINIS<br><span class="bet-mult-label">2,4,6 · 1.9x</span></div>
      <div class="bet-type-btn" onclick="setBetType('odd')">NELYGINIS<br><span class="bet-mult-label">1,3,5 · 1.9x</span></div>
      <div class="bet-type-btn" onclick="setBetType('sum7')">SUMA=7<br><span class="bet-mult-label">· 4x</span></div>
      <div class="bet-type-btn" onclick="setBetType('exact')">TIKSLUS<br><span class="bet-mult-label">· 6x</span></div>
    </div>
    <div id="numSelect">
      <div class="num-grid" id="numGrid"></div>
    </div>
    <div class="bet-row">
      <span class="bet-label">SUMA:</span>
      <button class="preset-btn" onclick="setBet(10)">10</button>
      <button class="preset-btn" onclick="setBet(25)">25</button>
      <button class="preset-btn" onclick="setBet(50)">50</button>
      <button class="preset-btn" onclick="setBet(100)">100</button>
      <input id="betInput" type="number" min="1" value="10" />
    </div>
    <button class="roll-btn" id="rollBtn" onclick="doRoll()">🎲 MESTI</button>
  </div>

  <div class="hist-title">◈ ISTORIJA ◈</div>
  <div class="hist-list" id="histList"></div>
</div>
<footer>LIQUID CASINO · Dice · 2026</footer>

<script>
const API='https://script.google.com/macros/s/AKfycby_zcF3Oh62j-N_-iHqv_8Mnpo-H776lNc5f9Wr0zsgzgKW-Ugt2QsBWQo8ml_bnCKkYA/exec';
let user=JSON.parse(localStorage.getItem('lc_user')||'null');
if(!user)window.location.href='login.html';
const DICE_FACES=['⚀','⚁','⚂','⚃','⚄','⚅'];
let betType='high',chosenNum=2,rolling=false;
let history=JSON.parse(localStorage.getItem('lc_dice_hist')||'[]');

// Build num grid
const numGrid=document.getElementById('numGrid');
for(let i=2;i<=12;i++){
  const b=document.createElement('div');
  b.className='num-btn'+(i===chosenNum?' active':'');
  b.textContent=i;
  b.onclick=()=>{chosenNum=i;document.querySelectorAll('.num-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');};
  numGrid.appendChild(b);
}

function setBetType(t){
  betType=t;
  document.querySelectorAll('.bet-type-btn').forEach(b=>b.classList.remove('active'));
  event.target.closest('.bet-type-btn').classList.add('active');
  document.getElementById('numSelect').style.display=t==='exact'?'block':'none';
}
function setBet(v){document.getElementById('betInput').value=v;}

function getMultAndWin(d1,d2,bet){
  const sum=d1+d2;
  if(betType==='high')  return {win:d1>=4&&d2>=4||false,mult:1.9,desc:'Aukštas (4-6)'};
  if(betType==='low')   return {win:d1<=3&&d2<=3||false,mult:1.9,desc:'Žemas (1-3)'};
  if(betType==='even')  return {win:sum%2===0,mult:1.9,desc:'Lyginis'};
  if(betType==='odd')   return {win:sum%2===1,mult:1.9,desc:'Nelyginis'};
  if(betType==='sum7')  return {win:sum===7,mult:4,desc:'Suma=7'};
  if(betType==='exact') return {win:sum===chosenNum,mult:6,desc:'Tikslus '+chosenNum};
  return {win:false,mult:1,desc:''};
}

function doRoll(){
  if(rolling)return;
  const bet=parseInt(document.getElementById('betInput').value)||0;
  if(bet<1){showToast('Įvesk statymą!','err');return;}
  if(bet>user.coins){showToast('Nepakankamai jevrejų!','err');return;}
  rolling=true;
  document.getElementById('rollBtn').disabled=true;
  resetResult();
  user.coins-=bet;saveUser();updateBal();
  const d1=document.getElementById('die1'),d2=document.getElementById('die2');
  d1.className='die rolling';d2.className='die rolling';

  let ticks=0;
  const interval=setInterval(()=>{
    d1.textContent=DICE_FACES[Math.floor(Math.random()*6)];
    d2.textContent=DICE_FACES[Math.floor(Math.random()*6)];
    ticks++;
    if(ticks>15){
      clearInterval(interval);
      const r1=Math.floor(Math.random()*6)+1,r2=Math.floor(Math.random()*6)+1;
      d1.textContent=DICE_FACES[r1-1];
      d2.textContent=DICE_FACES[r2-1];
      const {win,mult,desc}=getMultAndWin(r1,r2,bet);
      const won=win?Math.floor(bet*mult):0;
      const profit=won-bet;
      user.coins+=won;user.xp+=Math.floor(bet/10);user.level=getLevel(user.xp);
      saveUser();updateBal();
      d1.className='die '+(win?'win':'lose');
      d2.className='die '+(win?'win':'lose');
      showResult(r1+r2,win,profit,desc);
      history.unshift({r1,r2,sum:r1+r2,desc,profit});
      if(history.length>20)history.pop();
      localStorage.setItem('lc_dice_hist',JSON.stringify(history));
      renderHistory();
      if(win)showToast('+'+profit+' jevrejų!','ok');
      else showToast('-'+bet+' jevrejų','err');
      rolling=false;
      document.getElementById('rollBtn').disabled=false;
    }
  },80);
}

function showResult(sum,win,profit,desc){
  const rt=document.getElementById('resultText'),rc=document.getElementById('resultCoins');
  rt.textContent=(win?'✓ ':'✗ ')+desc+' (suma: '+sum+')';
  rt.style.color=win?'var(--neon-green)':'var(--neon-red)';
  rt.classList.add('show');
  rc.textContent=(profit>=0?'+':'')+profit+' JEVREJŲ';
  rc.style.color=profit>=0?'var(--neon-green)':'var(--neon-red)';
  rc.classList.add('show');
}
function resetResult(){const rt=document.getElementById('resultText'),rc=document.getElementById('resultCoins');rt.className='';rt.textContent='';rc.className='';rc.textContent='';}
function renderHistory(){
  if(!history.length){document.getElementById('histList').innerHTML='<div style="text-align:center;color:var(--text-dim);font-size:0.75rem;padding:16px;">Dar nebuvo žaidimų</div>';return;}
  document.getElementById('histList').innerHTML=history.slice(0,10).map(h=>`<div class="hist-row"><span class="hist-info">${h.r1+h.r2||h.sum} · ${h.desc}</span><span class="hist-profit ${h.profit>=0?'win':'loss'}">${h.profit>=0?'+':''}${h.profit} jev.</span></div>`).join('');
}
function getLevel(xp){const l=[0,100,300,600,1000,1500,2200,3000,4000,5500];let lv=1;for(let i=0;i<l.length;i++){if(xp>=l[i])lv=i+1;}return lv;}
function updateBal(){document.getElementById('balPill').textContent='⬡ '+user.coins.toLocaleString()+' JEVREJŲ';}
async function saveUser(){localStorage.setItem('lc_user',JSON.stringify(user));try{await fetch(API,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action:'update',username:user.username,coins:user.coins,xp:user.xp,level:user.level})});}catch(e){}}
function showToast(msg,type='info'){const t=document.getElementById('toast');t.textContent=msg;t.className=`show ${type}`;clearTimeout(t._timer);t._timer=setTimeout(()=>{t.className=type;},3000);}
updateBal();renderHistory();
const bgC=document.getElementById('bgCanvas'),bgX=bgC.getContext('2d');
function resizeBg(){bgC.width=innerWidth;bgC.height=innerHeight;}resizeBg();addEventListener('resize',resizeBg);
const CLR=['#00f5ff','#bf00ff','#ff0080','#0057ff'];
const pts=Array.from({length:50},()=>({x:Math.random()*innerWidth,y:Math.random()*innerHeight,r:Math.random()*1.4+0.3,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3-.12,c:CLR[Math.floor(Math.random()*4)],a:Math.random()*.5+.2,p:Math.random()*Math.PI*2}));
(function bgLoop(){bgX.clearRect(0,0,bgC.width,bgC.height);let g=bgX.createRadialGradient(bgC.width*.2,bgC.height*.3,0,bgC.width*.2,bgC.height*.3,bgC.width*.6);g.addColorStop(0,'rgba(0,87,255,0.05)');g.addColorStop(1,'transparent');bgX.fillStyle=g;bgX.fillRect(0,0,bgC.width,bgC.height);g=bgX.createRadialGradient(bgC.width*.8,bgC.height*.7,0,bgC.width*.8,bgC.height*.7,bgC.width*.5);g.addColorStop(0,'rgba(191,0,255,0.05)');g.addColorStop(1,'transparent');bgX.fillStyle=g;bgX.fillRect(0,0,bgC.width,bgC.height);pts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.p+=.04;if(p.y<-10){p.y=bgC.height+10;p.x=Math.random()*bgC.width;}if(p.x<-10)p.x=bgC.width+10;if(p.x>bgC.width+10)p.x=-10;bgX.save();bgX.beginPath();bgX.arc(p.x,p.y,p.r,0,Math.PI*2);bgX.shadowBlur=10;bgX.shadowColor=p.c;bgX.globalAlpha=p.a*(.6+.4*Math.sin(p.p));bgX.fillStyle=p.c;bgX.fill();bgX.restore();});requestAnimationFrame(bgLoop);})();
const cursorEl=document.getElementById('cursor');const tColors=['#00f5ff','#bf00ff','#ff0080','#0057ff'];const tPool=[];
for(let i=0;i<14;i++){const t=document.createElement('div');t.className='trail';const s=Math.max(3,9-i*0.35);t.style.cssText=`width:${s}px;height:${s}px;opacity:0;background:${tColors[i%4]};box-shadow:0 0 ${s*1.5}px ${tColors[i%4]};`;document.body.appendChild(t);tPool.push({el:t});}
let mX=0,mY=0;const tPos=Array(14).fill(null).map(()=>({x:0,y:0}));
document.addEventListener('mousemove',e=>{mX=e.clientX;mY=e.clientY;cursorEl.style.left=mX+'px';cursorEl.style.top=mY+'px';});
(function tLoop(){tPos.unshift({x:mX,y:mY});tPos.pop();tPool.forEach((t,i)=>{t.el.style.left=tPos[i].x+'px';t.el.style.top=tPos[i].y+'px';t.el.style.opacity=Math.max(0,(1-i/14)*0.7);t.el.style.transform=`translate(-50%,-50%) scale(${Math.max(0.3,1-i/14)})`;});requestAnimationFrame(tLoop);})();
</script>
</body>
</html>
