<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LiquidCasino — Towers</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root{--neon-cyan:#00f5ff;--neon-purple:#bf00ff;--neon-pink:#ff0080;--neon-green:#00ff99;--neon-red:#ff2040;--neon-gold:#ffd700;--bg-deep:#020408;--bg-card:rgba(255,255,255,0.03);--text-dim:rgba(255,255,255,0.5);}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Rajdhani',sans-serif;background:var(--bg-deep);color:#fff;min-height:100vh;overflow-x:hidden;cursor:none;}
  #cursor{position:fixed;pointer-events:none;z-index:99999;width:10px;height:10px;border-radius:50%;background:var(--neon-cyan);box-shadow:0 0 10px var(--neon-cyan);transform:translate(-50%,-50%);}
  .trail{position:fixed;pointer-events:none;z-index:99998;border-radius:50%;transform:translate(-50%,-50%);}
  #bgCanvas{position:fixed;inset:0;z-index:0;pointer-events:none;}
  body::before{content:'';position:fixed;inset:0;z-index:1;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;opacity:0.4;}
  #main{position:relative;z-index:2;max-width:560px;margin:0 auto;padding:0 20px 80px;}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:20px 0;gap:12px;flex-wrap:wrap;}
  .back-btn{font-family:'Orbitron',monospace;font-size:0.65rem;letter-spacing:0.2em;color:var(--text-dim);border:1px solid rgba(255,255,255,0.1);background:transparent;padding:8px 18px;border-radius:100px;cursor:none;text-decoration:none;transition:all 0.3s;}
  .back-btn:hover{color:var(--neon-cyan);border-color:rgba(0,245,255,0.4);}
  .balance-pill{font-family:'Orbitron',monospace;font-size:0.75rem;letter-spacing:0.15em;color:var(--neon-gold);border:1px solid rgba(255,215,0,0.3);background:rgba(255,215,0,0.06);padding:8px 20px;border-radius:100px;}
  .page-title{font-family:'Orbitron',monospace;font-weight:900;font-size:clamp(1.8rem,8vw,3rem);background:linear-gradient(135deg,var(--neon-green),var(--neon-cyan));background-size:200% 200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:gradShift 3s ease infinite;text-align:center;margin:10px 0 6px;}
  @keyframes gradShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
  .page-sub{text-align:center;font-size:0.75rem;letter-spacing:0.3em;color:var(--text-dim);margin-bottom:20px;}

  /* STATS */
  .stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}
  .stat-card{background:var(--bg-card);border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:12px;text-align:center;}
  .stat-lbl{font-family:'Orbitron',monospace;font-size:0.55rem;letter-spacing:0.25em;color:var(--text-dim);margin-bottom:3px;}
  .stat-v{font-family:'Orbitron',monospace;font-size:1rem;font-weight:900;}
  #sMult{color:var(--neon-cyan);}#sWin{color:var(--neon-green);}#sLvl{color:var(--neon-purple);}

  /* TOWER */
  .tower-wrap{background:rgba(255,255,255,0.02);border:1px solid rgba(0,255,153,0.12);border-radius:18px;padding:16px;margin-bottom:16px;position:relative;}
  #tower{display:flex;flex-direction:column;gap:8px;}

  .tower-row{display:grid;gap:8px;position:relative;}
  .tower-row.cols2{grid-template-columns:1fr 1fr;}
  .tower-row.cols3{grid-template-columns:1fr 1fr 1fr;}

  .tower-cell{aspect-ratio:2;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;cursor:none;transition:all 0.25s;border:1px solid rgba(255,255,255,0.07);background:rgba(255,255,255,0.03);position:relative;overflow:hidden;}
  .tower-cell.active{border-color:rgba(0,255,153,0.4);cursor:none;}
  .tower-cell.active:hover{background:rgba(0,255,153,0.1);border-color:var(--neon-green);transform:scale(1.04);box-shadow:0 0 16px rgba(0,255,153,0.2);}
  .tower-cell.cleared{border-color:rgba(0,255,153,0.3);background:rgba(0,255,153,0.07);}
  .tower-cell.bomb{border-color:rgba(255,32,64,0.5);background:rgba(255,32,64,0.1);animation:bombShake 0.4s ease;}
  .tower-cell.hidden-bomb{border-color:rgba(255,32,64,0.3);background:rgba(255,32,64,0.06);}
  .tower-cell.locked{opacity:0.3;}
  @keyframes bombShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

  .row-mult{position:absolute;right:-44px;top:50%;transform:translateY(-50%);font-family:'Orbitron',monospace;font-size:0.6rem;color:var(--text-dim);width:38px;text-align:right;}
  .row-mult.active-row{color:var(--neon-green);}

  /* RESULT */
  #resultOverlay{display:none;position:absolute;inset:0;background:rgba(2,4,8,0.88);border-radius:18px;align-items:center;justify-content:center;flex-direction:column;gap:10px;z-index:10;backdrop-filter:blur(4px);}
  #resultOverlay.show{display:flex;}
  #ovIcon{font-size:3rem;animation:pop 0.5s cubic-bezier(.17,.67,.3,1.4);}
  @keyframes pop{0%{transform:scale(0)}100%{transform:scale(1)}}
  #ovTitle{font-family:'Orbitron',monospace;font-size:1.3rem;font-weight:900;}
  #ovCoins{font-family:'Orbitron',monospace;font-size:0.9rem;letter-spacing:0.15em;}

  /* CONTROLS */
  .controls{background:var(--bg-card);border:1px solid rgba(0,255,153,0.1);border-radius:16px;padding:20px;margin-bottom:16px;display:flex;flex-direction:column;gap:14px;}
  .ctrl-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .ctrl-lbl{font-family:'Orbitron',monospace;font-size:0.6rem;letter-spacing:0.3em;color:var(--text-dim);min-width:70px;}
  .diff-btns{display:flex;gap:6px;}
  .diff-btn{font-family:'Orbitron',monospace;font-size:0.65rem;letter-spacing:0.1em;padding:7px 14px;border-radius:100px;border:1px solid;cursor:none;transition:all 0.25s;background:transparent;}
  .diff-btn.easy{color:var(--neon-green);border-color:rgba(0,255,153,0.3);}
  .diff-btn.medium{color:var(--neon-gold);border-color:rgba(255,215,0,0.3);}
  .diff-btn.hard{color:var(--neon-red);border-color:rgba(255,32,64,0.3);}
  .diff-btn.easy.active{background:rgba(0,255,153,0.12);box-shadow:0 0 12px rgba(0,255,153,0.25);}
  .diff-btn.medium.active{background:rgba(255,215,0,0.1);box-shadow:0 0 12px rgba(255,215,0,0.25);}
  .diff-btn.hard.active{background:rgba(255,32,64,0.12);box-shadow:0 0 12px rgba(255,32,64,0.25);}
  .preset-btn{font-family:'Orbitron',monospace;font-size:0.6rem;letter-spacing:0.1em;padding:6px 12px;border-radius:100px;border:1px solid rgba(255,255,255,0.12);background:transparent;color:var(--text-dim);cursor:none;transition:all 0.2s;}
  .preset-btn:hover{border-color:rgba(0,255,153,0.4);color:var(--neon-green);}
  #betInput{font-family:'Orbitron',monospace;font-size:0.85rem;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);color:#fff;padding:8px 14px;border-radius:10px;outline:none;width:100px;text-align:center;}
  .btn-row{display:flex;gap:10px;}
  .start-btn{flex:1;font-family:'Orbitron',monospace;font-size:0.75rem;letter-spacing:0.25em;font-weight:700;color:#000;background:var(--neon-green);border:none;padding:14px;border-radius:100px;cursor:none;transition:all 0.3s;box-shadow:0 0 20px rgba(0,255,153,0.3);}
  .start-btn:hover{box-shadow:0 0 36px rgba(0,255,153,0.6);transform:scale(1.02);}
  .start-btn:disabled{opacity:0.4;transform:none;}
  .cashout-btn{flex:1;font-family:'Orbitron',monospace;font-size:0.75rem;letter-spacing:0.25em;font-weight:700;color:#000;background:var(--neon-gold);border:none;padding:14px;border-radius:100px;cursor:none;transition:all 0.3s;display:none;box-shadow:0 0 20px rgba(255,215,0,0.3);}
  .cashout-btn:hover{box-shadow:0 0 36px rgba(255,215,0,0.6);transform:scale(1.02);}
  .cashout-btn.show{display:block;}

  #toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(100px);z-index:9999;font-family:'Orbitron',monospace;font-size:0.7rem;letter-spacing:0.2em;padding:12px 28px;border-radius:100px;transition:transform 0.4s cubic-bezier(.17,.67,.3,1.4),opacity 0.4s;opacity:0;pointer-events:none;white-space:nowrap;}
  #toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
  #toast.ok{background:rgba(0,255,153,0.12);border:1px solid rgba(0,255,153,0.4);color:var(--neon-green);}
  #toast.err{background:rgba(255,32,64,0.12);border:1px solid rgba(255,32,64,0.4);color:var(--neon-red);}
  footer{text-align:center;font-size:0.65rem;letter-spacing:0.2em;color:rgba(255,255,255,0.12);border-top:1px solid rgba(255,255,255,0.04);padding:20px;position:relative;z-index:2;}
  ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--neon-purple);border-radius:2px}
</style>
</head>
<body>
<div id="cursor"></div>
<canvas id="bgCanvas"></canvas>
<div id="toast"></div>
<div id="main">
  <div class="topbar">
    <a href="casino.html" class="back-btn">← ATGAL</a>
    <div class="balance-pill" id="balPill">⬡ 0 JEVREJŲ</div>
  </div>
  <div class="page-title">TOWERS</div>
  <div class="page-sub">◈ LIPK AUKŠTYN — PASIIMK KADA NORI ◈</div>

  <div class="stats-row">
    <div class="stat-card"><div class="stat-lbl">MULTIPLIER</div><div class="stat-v" id="sMult">1.00x</div></div>
    <div class="stat-card"><div class="stat-lbl">LAIMĖJIMAS</div><div class="stat-v" id="sWin">0</div></div>
    <div class="stat-card"><div class="stat-lbl">LYGIS</div><div class="stat-v" id="sLvl">0/8</div></div>
  </div>

  <div class="tower-wrap" style="padding-right:56px;position:relative;">
    <div id="tower"></div>
    <div id="resultOverlay">
      <div id="ovIcon"></div>
      <div id="ovTitle"></div>
      <div id="ovCoins"></div>
    </div>
  </div>

  <div class="controls">
    <div class="ctrl-row">
      <span class="ctrl-lbl">SUNKUMAS</span>
      <div class="diff-btns">
        <button class="diff-btn easy active" onclick="setDiff('easy')">LENGVAS</button>
        <button class="diff-btn medium"      onclick="setDiff('medium')">VIDUTINIS</button>
        <button class="diff-btn hard"        onclick="setDiff('hard')">SUNKUS</button>
      </div>
    </div>
    <div class="ctrl-row">
      <span class="ctrl-lbl">SUMA</span>
      <div style="display:flex;gap:6px;flex-wrap:wrap;">
        <button class="preset-btn" onclick="setBet(10)">10</button>
        <button class="preset-btn" onclick="setBet(25)">25</button>
        <button class="preset-btn" onclick="setBet(50)">50</button>
        <button class="preset-btn" onclick="setBet(100)">100</button>
      </div>
      <input id="betInput" type="number" min="1" value="10" />
    </div>
    <div class="btn-row">
      <button class="start-btn" id="startBtn" onclick="startGame()">🗼 PRADĖTI</button>
      <button class="cashout-btn" id="cashoutBtn" onclick="cashout()">💰 PASIIMTI</button>
    </div>
  </div>
</div>
<footer>LIQUID CASINO · Towers · 2026</footer>

<script>
const API='https://script.google.com/macros/s/AKfycby_zcF3Oh62j-N_-iHqv_8Mnpo-H776lNc5f9Wr0zsgzgKW-Ugt2QsBWQo8ml_bnCKkYA/exec';
let user=JSON.parse(localStorage.getItem('lc_user')||'null');
if(!user)window.location.href='login.html';

// difficulty: cols, bombs per row
const DIFFS={easy:{cols:3,bombs:1},medium:{cols:3,bombs:2},hard:{cols:2,bombs:1}};
let diff='easy',bet=10,active=false,currentRow=0,currentMult=1;
const ROWS=8;

// Mults per row per difficulty
const MULTS={
  easy: [1.4,2.0,2.8,3.9,5.6,8.1,12,18],
  medium:[1.9,3.5,6.5,12,22,42,80,150],
  hard:  [1.8,3.2,5.8,10,18,33,60,110],
};

let rowData=[]; // [{bombs:[idx], cols}]

function setDiff(d){
  if(active)return;
  diff=d;
  document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
  buildTower();
}
function setBet(v){document.getElementById('betInput').value=v;}

function buildTower(highlight=-1){
  const cfg=DIFFS[diff];
  const twr=document.getElementById('tower');
  twr.innerHTML='';
  for(let r=ROWS-1;r>=0;r--){
    const rowEl=document.createElement('div');
    rowEl.className='tower-row cols'+cfg.cols;
    rowEl.id='row-'+r;
    const mult=MULTS[diff][r];
    const mEl=document.createElement('div');
    mEl.className='row-mult'+(r===highlight?' active-row':'');
    mEl.textContent=mult+'x';
    rowEl.appendChild(mEl);
    for(let c=0;c<cfg.cols;c++){
      const cell=document.createElement('div');
      cell.className='tower-cell'+(active&&r===currentRow?' active':'')+(active&&r<currentRow?' locked':'');
      cell.id=`cell-${r}-${c}`;
      cell.textContent='';
      if(active&&r===currentRow) cell.onclick=()=>pick(r,c);
      rowEl.appendChild(cell);
    }
    twr.appendChild(rowEl);
  }
}

function startGame(){
  bet=parseInt(document.getElementById('betInput').value)||0;
  if(bet<1){showToast('Įvesk statymą!','err');return;}
  if(bet>user.coins){showToast('Nepakankamai jevrejų!','err');return;}
  user.coins-=bet;saveUser();updateBal();
  active=true;currentRow=0;currentMult=1;
  rowData=[];
  const cfg=DIFFS[diff];
  for(let r=0;r<ROWS;r++){
    const bombs=[];
    const pool=[...Array(cfg.cols).keys()];
    while(bombs.length<cfg.bombs){const idx=pool.splice(Math.floor(Math.random()*pool.length),1)[0];bombs.push(idx);}
    rowData.push({bombs,cols:cfg.cols});
  }
  document.getElementById('startBtn').disabled=true;
  document.getElementById('cashoutBtn').classList.add('show');
  document.getElementById('betInput').disabled=true;
  document.getElementById('resultOverlay').classList.remove('show');
  buildTower();
  updateStats();
}

function pick(r,c){
  if(!active||r!==currentRow)return;
  const data=rowData[r];
  const isBomb=data.bombs.includes(c);
  const cell=document.getElementById(`cell-${r}-${c}`);
  if(isBomb){
    cell.className='tower-cell bomb';cell.textContent='💣';
    // reveal all bombs in this row
    data.bombs.forEach(b=>{if(b!==c){const bc=document.getElementById(`cell-${r}-${b}`);bc.className='tower-cell hidden-bomb';bc.textContent='💣';}});
    active=false;
    document.getElementById('startBtn').disabled=false;
    document.getElementById('cashoutBtn').classList.remove('show');
    document.getElementById('betInput').disabled=false;
    showOverlay('💥','SUSPROGAI!',-bet,false);
    showToast('-'+bet+' jevrejų','err');
    saveUser();
  } else {
    cell.className='tower-cell cleared';cell.textContent='💎';
    currentRow++;
    currentMult=MULTS[diff][r];
    updateStats();
    if(currentRow>=ROWS){cashout();}
    else{buildTower(currentRow);}
  }
}

function cashout(){
  if(!active)return;
  active=false;
  const won=Math.floor(bet*currentMult);
  const profit=won-bet;
  user.coins+=won;user.xp+=Math.floor(bet/5);user.level=getLevel(user.xp);
  saveUser();updateBal();
  // reveal all remaining bombs
  for(let r=currentRow;r<ROWS;r++){
    rowData[r].bombs.forEach(b=>{const bc=document.getElementById(`cell-${r}-${b}`);if(bc){bc.className='tower-cell hidden-bomb';bc.textContent='💣';}});
  }
  document.getElementById('startBtn').disabled=false;
  document.getElementById('cashoutBtn').classList.remove('show');
  document.getElementById('betInput').disabled=false;
  showOverlay('💰','PASIĖMEI!',profit,true);
  if(profit>0)showToast('+'+profit+' jevrejų!','ok');
}

function showOverlay(icon,title,profit,win){
  const o=document.getElementById('resultOverlay');
  document.getElementById('ovIcon').textContent=icon;
  document.getElementById('ovTitle').textContent=title;
  document.getElementById('ovTitle').style.color=win?'var(--neon-green)':'var(--neon-red)';
  document.getElementById('ovCoins').textContent=(profit>=0?'+':'')+profit+' JEVREJŲ';
  document.getElementById('ovCoins').style.color=profit>=0?'var(--neon-green)':'var(--neon-red)';
  o.classList.add('show');
  setTimeout(()=>o.classList.remove('show'),3000);
}

function updateStats(){
  const won=Math.floor(bet*currentMult);
  document.getElementById('sMult').textContent=currentMult.toFixed(2)+'x';
  document.getElementById('sWin').textContent=won;
  document.getElementById('sLvl').textContent=currentRow+'/'+ROWS;
}
function getLevel(xp){const l=[0,100,300,600,1000,1500,2200,3000,4000,5500];let lv=1;for(let i=0;i<l.length;i++){if(xp>=l[i])lv=i+1;}return lv;}
function updateBal(){document.getElementById('balPill').textContent='⬡ '+user.coins.toLocaleString()+' JEVREJŲ';}
async function saveUser(){localStorage.setItem('lc_user',JSON.stringify(user));try{await fetch(API,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action:'update',username:user.username,coins:user.coins,xp:user.xp,level:user.level})});}catch(e){}}
function showToast(msg,type='info'){const t=document.getElementById('toast');t.textContent=msg;t.className=`show ${type}`;clearTimeout(t._timer);t._timer=setTimeout(()=>{t.className=type;},3000);}
buildTower();updateBal();updateStats();
const bgC=document.getElementById('bgCanvas'),bgX=bgC.getContext('2d');
function resizeBg(){bgC.width=innerWidth;bgC.height=innerHeight;}resizeBg();addEventListener('resize',resizeBg);
const CLR=['#00f5ff','#bf00ff','#ff0080','#0057ff'];
const pts=Array.from({length:50},()=>({x:Math.random()*innerWidth,y:Math.random()*innerHeight,r:Math.random()*1.4+0.3,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3-.12,c:CLR[Math.floor(Math.random()*4)],a:Math.random()*.5+.2,p:Math.random()*Math.PI*2}));
(function bgLoop(){bgX.clearRect(0,0,bgC.width,bgC.height);let g=bgX.createRadialGradient(bgC.width*.2,bgC.height*.3,0,bgC.width*.2,bgC.height*.3,bgC.width*.6);g.addColorStop(0,'rgba(0,87,255,0.05)');g.addColorStop(1,'transparent');bgX.fillStyle=g;bgX.fillRect(0,0,bgC.width,bgC.height);g=bgX.createRadialGradient(bgC.width*.8,bgC.height*.7,0,bgC.width*.8,bgC.height*.7,bgC.width*.5);g.addColorStop(0,'rgba(191,0,255,0.05)');g.addColorStop(1,'transparent');bgX.fillStyle=g;bgX.fillRect(0,0,bgC.width,bgC.height);pts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.p+=.04;if(p.y<-10){p.y=bgC.height+10;p.x=Math.random()*bgC.width;}if(p.x<-10)p.x=bgC.width+10;if(p.x>bgC.width+10)p.x=-10;bgX.save();bgX.beginPath();bgX.arc(p.x,p.y,p.r,0,Math.PI*2);bgX.shadowBlur=10;bgX.shadowColor=p.c;bgX.globalAlpha=p.a*(.6+.4*Math.sin(p.p));bgX.fillStyle=p.c;bgX.fill();bgX.restore();});requestAnimationFrame(bgLoop);})();
const cursorEl=document.getElementById('cursor');const tColors=['#00f5ff','#bf00ff','#ff0080','#0057ff'];const tPool=[];
for(let i=0;i<14;i++){const t=document.createElement('div');t.className='trail';const s=Math.max(3,9-i*0.35);t.style.cssText=`width:${s}px;height:${s}px;opacity:0;background:${tColors[i%4]};box-shadow:0 0 ${s*1.5}px ${tColors[i%4]};`;document.body.appendChild(t);tPool.push({el:t});}
let mX=0,mY=0;const tPos=Array(14).fill(null).map(()=>({x:0,y:0}));
document.addEventListener('mousemove',e=>{mX=e.clientX;mY=e.clientY;cursorEl.style.left=mX+'px';cursorEl.style.top=mY+'px';});
(function tLoop(){tPos.unshift({x:mX,y:mY});tPos.pop();tPool.forEach((t,i)=>{t.el.style.left=tPos[i].x+'px';t.el.style.top=tPos[i].y+'px';t.el.style.opacity=Math.max(0,(1-i/14)*0.7);t.el.style.transform=`translate(-50%,-50%) scale(${Math.max(0.3,1-i/14)})`;});requestAnimationFrame(tLoop);})();
</script>
</body>
</html>
